<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ON1X VPN</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: rgba(28, 28, 30, 0.7); /* Цвет карточек как в темной теме iOS */
            --accent: #ffffff;
            --text-secondary: #8e8e93;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }
        
        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding-bottom: env(safe-area-inset-bottom);
            overflow-x: hidden;
        }

        /* Лаконичный фон без "грязи" */
        .bg-gradient {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, #1c1c1e 0%, #000000 70%);
            z-index: -1;
        }

        .app-container {
            width: 100%;
            max-width: 390px;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        /* Чистое стекло */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            will-change: transform;
        }

        .page {
            display: none;
            flex-direction: column;
            width: 100%;
            padding-top: 60px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .page.active { display: flex; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Заголовки */
        h1 { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 12px; text-align: center; }
        .subtitle { color: var(--text-secondary); font-size: 17px; text-align: center; line-height: 1.3; margin-bottom: 40px; }

        /* Кнопки */
        .btn {
            width: 100%; border: none; border-radius: 16px;
            font-weight: 600; font-size: 17px;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; transition: all 0.2s; cursor: pointer;
        }
        .btn-primary { 
            background: var(--accent); 
            color: #000; 
            padding: 18px;
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        .btn-download { 
            background: #2c2c2e; 
            color: #fff; 
            padding: 16px; 
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        /* Нижняя панель */
        .bottom-bar {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 350px;
            display: none; gap: 12px; z-index: 100;
        }
        .show-bar .bottom-bar { display: flex; }

        .logo-box { margin-bottom: 40px; text-align: center; }
        .logo-img { width: 80%; max-height: 100px; object-fit: contain; }
        
        .info-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            border: 1px solid var(--border);
        }
        .info-box p { color: var(--text-secondary); font-size: 14px; text-align: center; line-height: 1.4; }

        .check-svg { width: 60px; height: 60px; margin: 0 auto 20px; display: block; }
        .check-path { stroke: #fff; stroke-width: 4; fill: none; stroke-dasharray: 100; stroke-dashoffset: 100; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body class="step-1">

<div class="bg-gradient"></div>

<div class="app-container">

        <div class="logo-box">
            <img src="https://psv4.userapi.com/s/v1/d2/J2d6mpCVmXTwQ4iR_kq7Qg9hQSSPDK0Cvopy3xDjpWwUudmfsLeKyKrUV8G3Ba2eyXCGoseRAfZ2XPCbewFVqqoZ1_AjxwfOtVAzU6BzgDgACt73UBYVY0ltulNaEY4ZutlEksyS1wB0/logo.png" class="logo-img" alt="logo">
        </div>

        <button class="btn btn-primary" onclick="nav(2)">Начать настройку</button>
        
        <div class="info-box">

        <a href="https://github.com/Happ-proxy/happ-desktop/releases/latest/download/setup-Happ.x64.exe" class="btn btn-download">Windows</a>

</div>

<script>
    let step = 1;

    function nav(n) {
        step = n;
        document.body.className = n === 1 ? 'step-1' : 'show-bar';
        
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + n).classList.add('active');

        const action = document.getElementById('action-area');
        if (n === 2) {
            action.innerHTML = `<button class="btn btn-primary" onclick="nav(3)">Я установил</button>`;
        } else if (n === 3) {
            action.innerHTML = `<a href="happ://add/https://se.on1xvpn.ru:2096/sub/gqr5ce70vtvma796" class="btn btn-primary">Активировать</a>`;
            const path = document.querySelector('.check-path');
            path.style.animation = 'draw 0.5s ease forwards 0.2s';
        }
        
        if (navigator.vibrate) navigator.vibrate(10);
        window.scrollTo(0,0);
    }

    function goBack() { if (step > 1) nav(step - 1); }
</script>

</body>
</html>
