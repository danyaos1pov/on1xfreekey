<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ON1X VPN — Свободный интернет</title>
    <style>
        :root {
            /* Темная тема */
            --bg-page: radial-gradient(circle at 50% 0%, #1a103c 0%, #07080d 70%, #000000 100%);
            --bg-card: #0d0e12;
            --border-gradient: linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, rgba(6, 182, 212, 0) 100%);
            --text-title: #ffffff;
            --text-body: #eff1f5;
            --text-sub: #66667a;
            
            --btn-main-bg: linear-gradient(135deg, #06b6d4 0%, #3b82f6 50%, #6366f1 100%);
            --btn-main-text: #ffffff;
            
            --btn-reg-bg: #14151a;
            --btn-reg-border: rgba(255, 255, 255, 0.05);
            --btn-reg-text: #ffffff;
            
            --slider-track: #14151a;
            --slider-thumb: linear-gradient(135deg, #06b6d4, #6366f1);
            --slider-border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            /* Светлая тема */
            --bg-page: linear-gradient(180deg, #eef2f7 0%, #dfede9 100%);
            --bg-card: #ffffff;
            --border-gradient: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(239, 68, 68, 0) 100%);
            --text-title: #000000;
            --text-body: #1d1d1f;
            --text-sub: #86868b;
            
            --btn-main-bg: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            --btn-main-text: #ffffff;
            
            --btn-reg-bg: #f5f5f7;
            --btn-reg-border: rgba(0, 0, 0, 0.05);
            --btn-reg-text: #000000;
            
            --slider-track: #e5e5ea;
            --slider-thumb: linear-gradient(135deg, #ff416c, #ff4b2b);
            --slider-border: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.4s ease, border-color 0.4s ease, color 0.3s ease;
        }

        body {
            background: var(--bg-page) no-repeat fixed;
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 24px;
        }

        /* Ползунок по центру сверху */
        .theme-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 48px;
        }

        .theme-switch {
            position: relative;
            width: 64px;
            height: 32px;
            background-color: var(--slider-track);
            border: 1px solid var(--slider-border);
            border-radius: 30px;
            cursor: pointer;
            padding: 3px;
        }

        .theme-checkbox {
            display: none;
        }

        .theme-handle {
            width: 24px;
            height: 24px;
            background: var(--slider-thumb);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .theme-checkbox:checked + .theme-switch .theme-handle {
            transform: translateX(32px);
        }

        .container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Шапка */
        .brand-header {
            text-align: center;
        }

        .brand-title {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-title);
            margin-bottom: 6px;
        }

        .brand-slogan {
            font-size: 15px;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Карточки с градиентной рамкой */
        .section-box {
            position: relative;
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Имитация градиентного бордера */
        .section-box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 1px;
            background: var(--border-gradient);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding-left: 8px;
            margin-bottom: 2px;
        }

        /* Кнопки */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 16px;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Кнопка "Подключиться" с чистым градиентом без свечения */
        .btn-primary {
            background: var(--btn-main-bg);
            color: var(--btn-main-text);
        }

        /* Остальные кнопки */
        .btn-secondary {
            background-color: var(--btn-reg-bg);
            border: 1px solid var(--btn-reg-border);
            color: var(--btn-reg-text);
        }

        /* Стрелка справа */
        .arrow-icon {
            opacity: 0.3;
        }

        /* Эффект клика */
        .btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- Ползунок по центру -->
    <div class="theme-container">
        <input type="checkbox" id="themeInput" class="theme-checkbox">
        <label for="themeInput" class="theme-switch">
            <div class="theme-handle"></div>
        </label>
    </div>

    <div class="container">
        
        <!-- Шапка -->
        <header class="brand-header">
            <h1 class="brand-title">ON1X VPN</h1>
            <p class="brand-slogan">Свободный интернет</p>
        </header>

        <!-- Главные действия -->
        <main class="section-box">
            <a href="https://t.me/on1xVPN_bot?start=utm_link" class="btn btn-primary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    <span>Подключиться</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
            
            <a href="https://t.me/ON1Xvpn" class="btn btn-secondary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    <span>Наш канал</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </main>

        <!-- Поддержка -->
        <section class="section-box">
            <div class="section-title">Поддержка</div>
            
            <a href="https://t.me/ON1Xvpn_support" class="btn btn-secondary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>Telegram</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
            
            <a href="https://vk.com/on1xvpn" class="btn btn-secondary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c-3.04 0-5.5-2.46-5.5-5.5s2.46-5.5 5.5-5.5 5.5 2.46 5.5 5.5-2.46 5.5-5.5 5.5z"/></svg>
                    <span>ВКонтакте</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </section>

    </div>

    <script>
        const themeInput = document.getElementById('themeInput');
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeInput.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeInput.checked = false;
        }

        themeInput.addEventListener('change', () => {
            if (themeInput.checked) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
