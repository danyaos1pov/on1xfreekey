<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ON1X VPN — Свободный internet</title>
    <style>
        :root {
            /* Темная тема — Необрутализм (Графит + Токсичный лайм) */
            --bg-main: #0b0f17;
            --card-bg: #1e293b;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #ffffff;
            --text-body: #f8fafc;
            --text-sub: #94a3b8;
            
            --btn-primary-bg: #ccff00;
            /* Яркий акцент */
            --btn-primary-text: #000000;
            --btn-secondary-bg: #0f172a;
            --btn-secondary-border: #000000;
            
            --slider-bg: #1e293b;
            --slider-thumb: #ccff00;
            --icon-color: #ffffff;
        }

        [data-theme="light"] {
            /* Светлая тема — Газетный брутализм */
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #000000;
            --text-body: #0f172a;
            --text-sub: #64748b;
            
            --btn-primary-bg: #000000;
            --btn-primary-text: #ffffff;
            --btn-secondary-bg: #f8fafc;
            --btn-secondary-border: #000000;
            --slider-bg: #ffffff;
            --slider-thumb: #000000;
            --icon-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 24px;
            transition: background 0.3s ease;
        }

        /* Переключатель темы (в стиле Необрутализм) */
        .theme-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .theme-switch {
            position: relative;
            width: 76px;
            height: 38px;
            background: var(--slider-bg);
            border: 2px solid var(--card-border);
            border-radius: 0px;
            /* Жесткие углы */
            box-shadow: 3px 3px 0px var(--shadow-color);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.3s ease;
        }

        .theme-checkbox {
            display: none;
        }

        .switch-icon {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            z-index: 1;
            transition: stroke 0.3s ease;
            margin: 0 4px;
        }

        .theme-handle {
            position: absolute;
            left: 4px;
            width: 26px;
            height: 26px;
            background-color: var(--slider-thumb);
            border: 2px solid var(--card-border);
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 2;
        }

        .theme-checkbox:checked + .theme-switch .theme-handle {
            transform: translateX(38px);
        }

        /* Контейнер */
        .container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Шапка */
        .brand-header {
            text-align: center;
        }

        .brand-title {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-title);
            text-transform: uppercase;
            -webkit-text-stroke: 1px var(--card-border);
        }

        .brand-slogan {
            display: inline-block;
            font-size: 12px;
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: 2px solid var(--card-border);
            padding: 2px 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* Жесткие брутальные блоки */
        .section-box {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            border-radius: 0px; /* Фирменный отказ от сильных округлений */
            padding: 20px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            /* Фирменная жесткая тень */
            box-shadow: 8px 8px 0px var(--shadow-color);
            position: relative;
        }

        .section-title {
            font-size: 12px;
            font-weight: 900;
            color: var(--text-title);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -4px;
        }

        /* Кнопки */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 800;
            text-decoration: none;
            border: 2px solid var(--card-border);
            position: relative;
            box-shadow: 4px 4px 0px var(--shadow-color);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Фикс для заливки иконки ВК */
        .btn svg.vk-icon {
            fill: currentColor !important;
            stroke: none !important;
        }

        /* Эффект нажатия (кнопка физически вдавливается) */
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* Главная кнопка */
        .btn-primary {
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        /* Второстепенные */
        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-body);
        }

        .arrow-icon {
            opacity: 0.9;
        }
    </style>
</head>

    <script>
        const themeInput = document.getElementById('themeInput');
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeInput.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeInput.checked = false;
        }

        themeInput.addEventListener('change', () => {
            if (themeInput.checked) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
