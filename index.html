<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ON1X VPN — Свободный интернет</title>
    <style>
        :root {
            /* Темная тема — Необрутализм (Графит + Токсичный лайм) */
            --bg-main: #0b0f17;
            --card-bg: #1e293b;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #ffffff;
            --text-body: #f8fafc;
            --text-sub: #94a3b8;
            
            --btn-primary-bg: #ccff00; /* Яркий акцент */
            --btn-primary-text: #000000;
            --btn-secondary-bg: #0f172a;
            --btn-secondary-border: #000000;
            
            --slider-bg: #1e293b;
            --slider-thumb: #ccff00;
        }

        [data-theme="light"] {
            /* Светлая тема — Газетный брутализм */
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --card-border: #000000;
            --shadow-color: #000000;
            --text-title: #000000;
            --text-body: #0f172a;
            --text-sub: #64748b;
            
            --btn-primary-bg: #000000;
            --btn-primary-text: #ffffff;
            --btn-secondary-bg: #f8fafc;
            --btn-secondary-border: #000000;
            
            --slider-bg: #ffffff;
            --slider-thumb: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 24px;
            transition: background 0.3s ease;
        }

        /* Переключатель темы (в стиле Необрутализм) */
        .theme-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
        }

        .theme-switch {
            position: relative;
            width: 64px;
            height: 34px;
            background: var(--slider-bg);
            border: 2px solid var(--card-border);
            border-radius: 0px; /* Жесткие углы */
            box-shadow: 3px 3px 0px var(--shadow-color);
            cursor: pointer;
            padding: 3px;
        }

        .theme-checkbox {
            display: none;
        }

        .theme-handle {
            width: 24px;
            height: 24px;
            background-color: var(--slider-thumb);
            border: 2px solid var(--card-border);
            transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        .theme-checkbox:checked + .theme-switch .theme-handle {
            transform: translateX(30px);
        }

        /* Контейнер */
        .container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* Шапка */
        .brand-header {
            text-align: center;
        }

        .brand-title {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--text-title);
            text-transform: uppercase;
            -webkit-text-stroke: 1px var(--card-border);
        }

        .brand-slogan {
            display: inline-block;
            font-size: 12px;
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
            border: 2px solid var(--card-border);
            padding: 2px 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 6px;
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* Жесткие брутальные блоки */
        .section-box {
            background: var(--card-bg);
            border: 3px solid var(--card-border);
            border-radius: 0px; /* Фирменный отказ от сильных округлений */
            padding: 20px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            /* Фирменная жесткая тень */
            box-shadow: 8px 8px 0px var(--shadow-color);
            position: relative;
        }

        .section-title {
            font-size: 12px;
            font-weight: 900;
            color: var(--text-title);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: -4px;
        }

        /* Кнопки */
        .btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 800;
            text-decoration: none;
            border: 2px solid var(--card-border);
            position: relative;
            box-shadow: 4px 4px 0px var(--shadow-color);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn svg {
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Эффект нажатия (кнопка физически вдавливается) */
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--shadow-color);
        }

        /* Главная кнопка */
        .btn-primary {
            background: var(--btn-primary-bg);
            color: var(--btn-primary-text);
        }

        /* Второстепенные */
        .btn-secondary {
            background: var(--btn-secondary-bg);
            color: var(--text-body);
        }

        .arrow-icon {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- Ползунок -->
    <div class="theme-container">
        <input type="checkbox" id="themeInput" class="theme-checkbox">
        <label for="themeInput" class="theme-switch">
            <div class="theme-handle"></div>
        </label>
    </div>

    <div class="container">
        
        <!-- Шапка -->
        <header class="brand-header">
            <h1 class="brand-title">ON1X VPN</h1>
            <p class="brand-slogan">Свободный интернет</p>
        </header>

        <!-- Главный блок -->
        <main class="section-box">
            <a href="https://t.me/on1xVPN_bot?start=utm_link" class="btn btn-primary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    <span>ПОДКЛЮЧИТЬСЯ</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
            
            <a href="https://t.me/ON1Xvpn" class="btn btn-secondary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    <span>НАШ КАНАЛ</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </main>

        <!-- Блок Поддержки -->
        <section class="section-box">
            <div class="section-title">Поддержка</div>
            
            <a href="https://t.me/ON1Xvpn_support" class="btn btn-secondary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span>TELEGRAM</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
            
            <a href="https://vk.com/on1xvpn" class="btn btn-secondary" target="_blank">
                <div class="btn-left">
                    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5c-3.04 0-5.5-2.46-5.5-5.5s2.46-5.5 5.5-5.5 5.5 2.46 5.5 5.5-2.46 5.5-5.5 5.5z"/></svg>
                    <span>ВКОНТАКТЕ</span>
                </div>
                <svg width="16" height="16" viewBox="0 0 24 24" class="arrow-icon"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </a>
        </section>

    </div>

    <script>
        const themeInput = document.getElementById('themeInput');
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            themeInput.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeInput.checked = false;
        }

        themeInput.addEventListener('change', () => {
            if (themeInput.checked) {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>
